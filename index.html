<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designer VJ</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #eef3f8;
      color: #111827;
      font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .home {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 42px 24px;
    }
    .kicker {
      color: #0066e5;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0;
      line-height: 1.12;
    }
    p {
      max-width: 680px;
      margin: 12px 0 28px;
      color: #667085;
      font-size: 15px;
      line-height: 1.55;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }
    .card {
      min-height: 132px;
      display: grid;
      align-content: start;
      gap: 8px;
      padding: 18px;
      color: inherit;
      text-decoration: none;
      background: #ffffff;
      border: 1px solid #d8dee8;
      border-radius: 10px;
      box-shadow: 0 12px 28px rgba(17, 24, 39, 0.07);
    }
    .card:hover {
      border-color: #9dc5ff;
    }
    .card span,
    .card small {
      color: #667085;
      font-size: 12px;
      font-weight: 700;
    }
    .card strong {
      font-size: 17px;
      line-height: 1.28;
    }
  </style>

<style>
  .vj-protected-content {
    display: none;
  }

  body.vj-unlocked .vj-protected-content {
    display: block;
  }

  body.vj-unlocked .vj-lock {
    display: none;
  }

  .vj-lock {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #eef3f8;
    color: #111827;
    font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .vj-lock-card {
    width: min(100%, 380px);
    background: #ffffff;
    border: 1px solid #d8dee8;
    border-radius: 10px;
    padding: 22px;
    box-shadow: 0 16px 40px rgba(17, 24, 39, 0.1);
  }

  .vj-lock-card h1 {
    margin: 0 0 8px;
    font-size: 22px;
    line-height: 1.2;
    letter-spacing: 0;
  }

  .vj-lock-card p {
    margin: 0 0 16px;
    color: #667085;
    font-size: 14px;
    line-height: 1.5;
  }

  .vj-lock-form {
    display: grid;
    gap: 10px;
  }

  .vj-lock-form input {
    height: 44px;
    border: 1px solid #d8dee8;
    border-radius: 8px;
    padding: 0 12px;
    font: inherit;
  }

  .vj-lock-form button {
    height: 44px;
    border: 0;
    border-radius: 8px;
    background: #0066e5;
    color: #ffffff;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
  }

  .vj-lock-error {
    min-height: 18px;
    color: #b42318;
    font-size: 12px;
    font-weight: 700;
  }
</style>

</head>
<body>

<section class="vj-lock" aria-label="Protected page">
  <form class="vj-lock-card vj-lock-form" data-vj-lock>
    <h1>Designer VJ</h1>
    <p>Ingresá la contraseña para ver este material.</p>
    <input type="password" autocomplete="current-password" placeholder="Contraseña" aria-label="Contraseña" data-vj-password>
    <button type="submit">Entrar</button>
    <div class="vj-lock-error" data-vj-error></div>
  </form>
</section>
<script>
(() => {
  const expected = "3bb534922618f14b978bd59c9d98802604a69587847f610f3b0efe1a560f43d0";
  const key = "designer-vj-auth";
  const enc = new TextEncoder();
  const toHex = buffer => Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, "0")).join("");
  const unlock = () => document.body.classList.add("vj-unlocked");
  if (sessionStorage.getItem(key) === expected) unlock();
  document.querySelector("[data-vj-lock]")?.addEventListener("submit", async event => {
    event.preventDefault();
    const input = document.querySelector("[data-vj-password]");
    const error = document.querySelector("[data-vj-error]");
    const digest = await crypto.subtle.digest("SHA-256", enc.encode(input.value));
    const actual = toHex(digest);
    if (actual === expected) {
      sessionStorage.setItem(key, expected);
      unlock();
      input.value = "";
    } else {
      error.textContent = "Contraseña incorrecta.";
      input.select();
    }
  });
})();
</script>

<div class="vj-protected-content">

  <main class="home">
    <div class="kicker">Designer VJ</div>
    <h1>Materiales compartidos</h1>
    <p>Home de prototipos, one-pagers y artefactos HTML para compartir con equipos de producto y diseño.</p>
    <section class="grid">
      
        <a class="card" href="artifacts/order-summary-ui/">
          <span>24/04/2026</span>
          <strong>Order Summary UI</strong>
          <small>order-summary-ui</small>
        </a>
    </section>
  </main>

</div>
</body>
</html>
